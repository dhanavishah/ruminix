<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ruminix | Profile</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<style>
:root{
  --blue:#2563eb;
  --indigo:#4f46e5;
  --bg:#f5f7fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#0f172a;
  --muted:#64748b;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,sans-serif}

body{
  min-height:100vh;
  background-color: var(--bg);
  background-image:
    linear-gradient(rgba(15,23,42,0.09) 1px, transparent 1px),
    linear-gradient(90deg, rgba(15,23,42,0.09) 1px, transparent 1px);
  background-size:40px 40px;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
}

/* Notification styling */
.notification {
  position: fixed;
  top: 20px;
  right: 20px;
  background: linear-gradient(135deg, var(--indigo), var(--blue));
  color: white;
  padding: 14px 22px;
  border-radius: 14px;
  font-weight: 600;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  opacity: 0;
  transform: translateY(-20px);
  transition: all 0.4s ease;
  z-index: 1000;
}

.notification.show {
  opacity: 1;
  transform: translateY(0);
}

/* PROFILE CARD */
.profile-card{
  width:750px;
  background:white;
  border-radius:30px;
  padding:40px;
  box-shadow:0 25px 50px rgba(0,0,0,.05);
}

/* HEADER */
.profile-header{
  display:flex;
  align-items:center;
  gap:30px;
  margin-bottom:40px;
}

.profile-pic{
  width:120px;
  height:120px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--indigo),var(--blue));
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:42px;
  font-weight:600;
}

.profile-info h1{
  font-size:28px;
  margin-bottom:8px;
}

.profile-info p{
  color:var(--muted);
  font-size:14px;
}

.streak{
  margin-top:10px;
  background:var(--blue);
  color:white;
  padding:8px 14px;
  border-radius:12px;
  font-size:13px;
  display:inline-block;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:30px;
}

.stat-box{
  background:var(--card);
  padding:25px;
  border-radius:20px;
  border:1px solid var(--border);
  text-align:center;
}

.stat-box p{
  color:var(--muted);
  font-size:13px;
  margin-bottom:6px;
  font-weight:600;
}

.stat-box h2{
  font-size:28px;
  color:var(--indigo);
}

/* BUTTONS */
.actions{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

button{
  padding:10px 18px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:500;
}

.edit-btn{
  background:var(--blue);
  color:white;
}

.back-btn{
  background:white;
  border:1px solid var(--border);
}

.edit-btn:hover{opacity:.9}
.back-btn:hover{
  background:var(--blue);
  color:white;
}

/* EDIT MODAL */
.edit-modal{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  width:380px;
  padding:30px;
  border-radius:24px;
  box-shadow:0 30px 60px rgba(0,0,0,.15);
  z-index:1000;
}

.hidden{display:none}

.edit-modal h2{
  margin-bottom:20px;
  text-align:center;
  color:var(--indigo);
}

.edit-modal input{
  width:100%;
  padding:10px;
  margin-bottom:14px;
  border-radius:10px;
  border:1px solid var(--border);
}

.save-btn{
  width:100%;
  background:var(--blue);
  color:white;
}

.close-btn{
  position:absolute;
  top:12px;
  right:16px;
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
  color:var(--muted);
}
.close-btn:hover{color:var(--blue)}
</style>
</head>

<body>

<!-- Notification div -->
<div id="notification" class="notification"></div>

<div class="profile-card">

  <div class="profile-header">
    <div class="profile-pic" id="profileInitial">R</div>

    <div class="profile-info">
      <h1 id="profileName">Ruminix User</h1>
      <p id="profileEmail">user@email.com</p>
      <div class="streak">🔥 Current Streak: <span>0 Days</span></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box">
      <p>Total Focus Time</p>
      <h2>0h</h2>
    </div>
    <div class="stat-box">
      <p>Sessions Completed</p>
      <h2>0</h2>
    </div>
    <div class="stat-box">
      <p>Highest Streak</p>
      <h2>0 Days</h2>
    </div>
    <div class="stat-box">
      <p>Weekly Average</p>
      <h2>0h</h2>
    </div>
  </div>

  <div class="actions">
    <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
    <button class="edit-btn" onclick="openEdit()">Edit Profile</button>
  </div>

</div>

<!-- EDIT PROFILE MODAL -->
<div id="editModal" class="edit-modal hidden">
  <button class="close-btn" onclick="closeEdit()">✕</button>
  <h2>Edit Profile</h2>

  <input type="text" id="editName" placeholder="Full Name">
  <input type="email" id="editEmail" placeholder="Email">

  <button class="save-btn" onclick="saveProfile()">Save Changes</button>
</div>

<!-- SUPABASE SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://udfnnxokckkipfpiuhat.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkZm5ueG9rY2traXBmcGl1aGF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTQ0MDUsImV4cCI6MjA4ODA5MDQwNX0.Gr3T1xAPuZI86wT3fbl9mWkPQDqBmTMZWakD1LxgC1w";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let currentUserId = null;

// Show themed notification
function showNotification(message, duration = 3000) {
  const notif = document.getElementById("notification");
  notif.textContent = message;
  notif.classList.add("show");
  setTimeout(() => notif.classList.remove("show"), duration);
}

document.addEventListener("DOMContentLoaded", async () => {

  const { data: { session } } = await supabaseClient.auth.getSession();

  if (!session) {
    window.location.href = "login.html"; // fixed path for Vercel
    return;
  }

  const user = session.user;
  currentUserId = user.id;

  // Show email
  document.getElementById("profileEmail").textContent = user.email;

  // Load profile from database
  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  if (profile) {
    document.getElementById("profileName").textContent = profile.full_name;
    document.getElementById("profileInitial").textContent =
      profile.full_name?.charAt(0).toUpperCase() || "U";

    document.getElementById("editName").value = profile.full_name;
    document.getElementById("editEmail").value = user.email;
  }

});

// SAVE PROFILE FUNCTION
async function saveProfile() {

  const newName = document.getElementById("editName").value;

  const { error } = await supabaseClient
    .from("profiles")
    .update({ full_name: newName })
    .eq("id", currentUserId);

  if (error) {
    showNotification("❌ Update failed: " + error.message);
  } else {
    document.getElementById("profileName").textContent = newName;
    document.getElementById("profileInitial").textContent =
      newName.charAt(0).toUpperCase();

    closeEdit();
    showNotification("✅ Profile updated successfully!");
  }
}

// Modal Controls
function openEdit() {
  document.getElementById("editModal").classList.remove("hidden");
}

function closeEdit() {
  document.getElementById("editModal").classList.add("hidden");
}

function goBack() {
  window.location.href = "../index.html"; // fixed path for dashboard
}
</script>

</body>
</html>
