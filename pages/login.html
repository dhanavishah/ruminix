<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ruminix | Login</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<style>
:root{
  --blue:#2563eb;
  --indigo:#4f46e5;
  --bg:#f5f7fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#0f172a;
  --muted:#64748b;
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,system-ui,sans-serif;
}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-color: var(--bg);
  background-image:
    linear-gradient(rgba(15,23,42,0.09) 1px, transparent 1px),
    linear-gradient(90deg, rgba(15,23,42,0.09) 1px, transparent 1px);
  background-size:40px 40px;
  color:var(--text);
}
.notification {
  position: fixed;
  top: 20px;
  right: 20px;
  background: linear-gradient(135deg, var(--indigo), var(--blue));
  color: white;
  padding: 14px 22px;
  border-radius: 14px;
  font-weight: 600;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  opacity: 0;
  transform: translateY(-20px);
  transition: all 0.4s ease;
  z-index: 1000;
}
.notification.show {
  opacity: 1;
  transform: translateY(0);
}
.login-box{
  width:400px;
  background:var(--card);
  padding:40px;
  border-radius:30px;
  box-shadow:0 25px 50px rgba(0,0,0,.05);
}
.login-box h1{
  font-size:28px;
  margin-bottom:10px;
}
.login-box p{
  color:var(--muted);
  font-size:14px;
  margin-bottom:25px;
}
input{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:14px;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--indigo),var(--blue));
  color:white;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
}
button:hover{
  opacity:.9;
}
.extra{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:18px 0;
  font-size:14px;
}
.remember{
  display:flex;
  align-items:center;
  gap:8px;
  white-space:nowrap;  
}
.remember input{
  width:auto;
  margin:0;
}
.extra a{
  color:var(--blue);
  text-decoration:none;
}
.register-link{
  margin-top:18px;
  font-size:14px;
  text-align:center;
  color:var(--muted);
}
.register-link a{
  color:var(--blue);
  text-decoration:none;
  font-weight:500;
}
.password-wrapper{
  position:relative;
}
.password-wrapper i{
  position:absolute;
  right:14px;
  top:14px;
  cursor:pointer;
  color:var(--muted);
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div id="notification" class="notification"></div>
<div class="login-box">
  <h1>Welcome Back</h1>
  <p>Login to continue using Ruminix.</p>
  <form id="loginForm">
    <input type="email" placeholder="Email Address" required>
    <div class="password-wrapper">
      <input type="password" id="password" placeholder="Password" required>
      <i class="fa-solid fa-eye" id="togglePassword" style="cursor: pointer; color: var(--blue);"></i>
    </div>
    <div class="extra">
      <label class="remember">
        <input type="checkbox" id="remember">
        <span>Remember me</span>
      </label>
      <a href="#">Forgot Password?</a>
    </div>
    <button type="submit">Login</button>
  </form>
  <div class="register-link">
    Don’t have an account? <a href="register.html">Create one</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://udfnnxokckkipfpiuhat.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkZm5ueG9rY2traXBmcGl1aGF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTQ0MDUsImV4cCI6MjA4ODA5MDQwNX0.Gr3T1xAPuZI86wT3fbl9mWkPQDqBmTMZWakD1LxgC1w"; // keep same key
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
function showNotification(message, duration = 3000) {
  const notif = document.getElementById("notification");
  notif.textContent = message;
  notif.classList.add("show");
  setTimeout(() => notif.classList.remove("show"), duration);
}
// Login form handler
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.querySelector("input[type='email']").value;
  const password = document.getElementById("password").value;
  try {
    const btn = e.target.querySelector("button");
    btn.disabled = true;
    btn.textContent = "Logging in...";
    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email,
      password
    });
    if (error) {
      showNotification("❌ Login failed: " + error.message);
    } else {
      showNotification("✅ Login successful! Redirecting...");
      setTimeout(() => window.location.href = "../index.html", 1000);
    }
  } catch (err) {
    showNotification("⚠️ Network error. Please check your connection.");
  } finally {
    const btn = e.target.querySelector("button");
    btn.disabled = false;
    btn.textContent = "Login";
  }
});
// Password toggle
const togglePassword = document.getElementById("togglePassword");
const passwordInput = document.getElementById("password");
togglePassword.addEventListener("click", function () {
  const type = passwordInput.type === "password" ? "text" : "password";
  passwordInput.type = type;
  this.classList.toggle("fa-eye-slash");
});
</script>
</body>
</html>
